<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>체크포인트 QR 코드</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
<style>
  body { font-family: sans-serif; background: #f5f5f5; padding: 40px; }
  h1 { text-align: center; margin-bottom: 40px; }
  .qr-grid { display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; }
  .qr-card {
    background: white;
    border-radius: 16px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    min-width: 220px;
  }
  .qr-label { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #1a1a1a; }
  .qr-url { font-size: 11px; color: #888; margin-top: 12px; word-break: break-all; max-width: 200px; }
  canvas { display: block; margin: 0 auto; }
  @media print {
    body { background: white; padding: 20px; }
    .qr-grid { gap: 20px; }
  }
</style>
</head>
<body>
<h1>2026 초록 발자국 — 체크포인트 QR</h1>
<div class="qr-grid" id="grid"></div>
<script>
const BASE = 'https://waven0310-ux.github.io/green-walk-cert/';
const CPS = [
  { label: '체크포인트 1', url: BASE + '?cp=1&token=Gw26cP1xK9m' },
  { label: '체크포인트 2', url: BASE + '?cp=2&token=Gw26cP2nR4j' },
  { label: '체크포인트 3', url: BASE + '?cp=3&token=Gw26cP3bT7p' },
];

const grid = document.getElementById('grid');
CPS.forEach(function(cp) {
  const card = document.createElement('div');
  card.className = 'qr-card';

  const label = document.createElement('div');
  label.className = 'qr-label';
  label.textContent = cp.label;

  const canvas = document.createElement('canvas');

  const urlEl = document.createElement('div');
  urlEl.className = 'qr-url';
  urlEl.textContent = cp.url;

  card.appendChild(label);
  card.appendChild(canvas);
  card.appendChild(urlEl);
  grid.appendChild(card);

  QRCode.toCanvas(canvas, cp.url, { width: 200, margin: 1 });
});
</script>
</body>
</html>
