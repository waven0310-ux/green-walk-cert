<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 초록 발자국 남기기 완주 인증서</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --green:      #00883A;
  --green-dark: #005C26;
  --green-light:#E8F5EE;
  --green-mid:  #2D7A4A;
  --cream:      #FAFDF8;
  --ink:        #111111;
  --muted:      #5f5f5f;
}
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: #D6E8DA;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 32px 16px;
  gap: 20px;
}

/* ── 입력 UI ── */
#screen-input { width: 100%; max-width: 500px; text-align: center; }
.input-card {
  background: white;
  padding: 40px 36px;
  box-shadow: 0 16px 48px rgba(0,0,0,0.12);
}
.input-event-tag {
  display: inline-block;
  background: var(--green);
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 5px 16px;
  letter-spacing: 0.5px;
  margin-bottom: 14px;
}
.input-title-img {
  width: 100%;
  max-width: 320px;
  height: auto;
  display: block;
  margin: 0 auto 8px;
}
.input-subtitle {
  font-size: 14px;
  font-weight: 400;
  color: var(--muted);
  margin-bottom: 32px;
}
.input-name {
  width: 100%;
  font-size: 22px;
  font-weight: 700;
  font-family: 'Noto Serif KR', serif;
  text-align: center;
  border: none;
  border-bottom: 2px solid var(--ink);
  padding: 8px 0 10px;
  background: transparent;
  color: var(--ink);
  outline: none;
  letter-spacing: 4px;
  margin-bottom: 28px;
}
.input-name::placeholder { color: #ccc; font-size: 16px; letter-spacing: 2px; }
.btn-generate {
  width: 100%;
  background: var(--green);
  color: white;
  font-size: 15px;
  font-weight: 700;
  border: none;
  padding: 15px;
  cursor: pointer;
  letter-spacing: 2px;
}
.btn-generate:hover { background: var(--green-dark); }

/* ── 액션 버튼 ── */
.cert-actions { display: flex; gap: 10px; }
.btn-download {
  background: var(--green-dark);
  color: white;
  font-size: 14px;
  font-weight: 700;
  border: none;
  padding: 12px 28px;
  cursor: pointer;
  letter-spacing: 1px;
}
.btn-back {
  background: transparent;
  color: #555;
  font-size: 14px;
  border: 1.5px solid #aaa;
  padding: 12px 20px;
  cursor: pointer;
}

/* 스크린리더 전용 */
.sr-only {
  position: absolute;
  width: 1px; height: 1px;
  padding: 0; margin: -1px;
  overflow: hidden;
  clip: rect(0 0 0 0);
  white-space: nowrap;
  border: 0;
}

/* ── 인증서 (1:1 정사각형) ── */
#screen-cert { display: none; flex-direction: column; align-items: center; gap: 16px; }

.cert-wrap {
  width: 600px;
  height: 600px;
}

.cert {
  width: 600px;
  height: 600px;
  background: var(--cream);
  position: relative;
  box-shadow: 0 24px 72px rgba(0,0,0,0.2);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* 이중 테두리 */
.cert::before {
  content: '';
  position: absolute;
  inset: 8px;
  border: 2.5px solid var(--green);
  pointer-events: none;
  z-index: 10;
}
.cert::after {
  content: '';
  position: absolute;
  inset: 14px;
  border: 1px solid rgba(0,136,58,0.3);
  pointer-events: none;
  z-index: 10;
}

/* 상단 초록 배너 */
.cert-banner {
  background: var(--green);
  height: 6px;
  flex-shrink: 0;
}

/* 본문 영역 */
.cert-body {
  flex: 1;
  display: flex;
  padding: 28px 52px 24px;
  position: relative;
}

/* 콘텐츠 */
.cert-right {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding-bottom: 48px;
}

/* 타이틀 */
.cert-title-img {
  width: 100%;
  max-width: 400px;
  height: auto;
  display: block;
  margin-bottom: 6px;
}
.cert-title-sub {
  font-size: 23px;
  font-weight: 900;
  color: var(--ink);
  font-family: 'Noto Serif KR', serif;
  letter-spacing: 8px;
  margin-bottom: 6px;
}
.cert-title-en {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.4px;
  margin-bottom: 18px;
  font-weight: 400;
}

/* 구분선 */
.cert-divider {
  width: 100%;
  height: 1.5px;
  background: var(--green);
  margin-bottom: 18px;
  opacity: 0.4;
  align-self: stretch;
}

/* 이름/주소 필드 */
.cert-fields { margin-bottom: 18px; width: 100%; }
.cert-field {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  font-size: 14px;
  color: var(--ink);
  text-align: left;
  font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
}
.cert-field-bullet {
  color: var(--green-dark);
  font-size: 10px;
  flex-shrink: 0;
}
.cert-field-label {
  font-weight: 600;
  flex-shrink: 0;
  letter-spacing: 2px;
  white-space: nowrap;
  width: 44px;
}
.cert-field-colon { flex-shrink: 0; color: var(--muted); }
.cert-field-value {
  flex: 1;
  border-bottom: 1px solid #bbb;
  padding-bottom: 2px;
  font-size: 17px;
  font-weight: 700;
  font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
  letter-spacing: 3px;
  color: var(--ink);
}
.cert-field-value.empty {
  color: transparent;
  border-bottom-style: solid;
}

/* 본문 */
.cert-text {
  font-size: 17px;
  line-height: 2.2;
  color: #2a2a2a;
  font-family: 'Noto Serif KR', serif;
  margin-bottom: 16px;
  text-align: center;
  width: 100%;
}

/* 날짜 */
.cert-date {
  font-size: 14px;
  color: #444;
  letter-spacing: 2px;
  font-family: 'Noto Serif KR', serif;
  margin-bottom: 16px;
  text-align: center;
}

/* 하단 */
.cert-footer {
  border-top: 1px solid rgba(0,136,58,0.2);
  padding-top: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: auto;
  width: 100%;
}
.cert-orgs {
  display: flex;
  align-items: center;
  gap: 14px;
}
.org-divider {
  width: 1px;
  height: 36px;
  background: #ccc;
  flex-shrink: 0;
}
.logo-img {
  height: auto;
  width: auto;
  max-height: 36px;
  max-width: 160px;
  display: block;
}

/* 하단 초록 배너 */
.cert-banner-bottom {
  background: var(--green);
  height: 6px;
  flex-shrink: 0;
}

/* ── 애니메이션 ── */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(28px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes certReveal {
  from { opacity: 0; transform: translateY(44px) scale(0.96); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50%      { transform: scale(1.04); }
}
.input-card {
  animation: fadeSlideUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
}
.btn-generate:active { animation: pulse 0.2s ease; }
.cert-wrap {
  animation: none;
}
.cert-wrap.show {
  animation: certReveal 0.55s cubic-bezier(0.34,1.56,0.64,1) both;
}

/* ── 모바일 반응형 (QR 스캔 = 휴대폰) ── */
@media (max-width: 660px) {
  body { padding: 16px 8px; }
  #screen-input { max-width: 92vw; }
  .input-card { padding: 32px 24px; }

  .cert-wrap {
    position: relative;
    max-width: 600px;
    max-height: 600px;
  }
  .cert {
    transform-origin: top left;
  }
}
/* ── 스탬프 화면 ── */
.stamp-card {
  background: white;
  box-shadow: 0 16px 48px rgba(0,0,0,0.12);
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow: hidden;
  position: relative;
  width: 100%;
}
.stamp-logos {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  padding: 18px 20px 0;
}
.stamp-logo-l {
  height: 46px;
  object-fit: contain;
}
.stamp-logo-r {
  height: 30px;
  object-fit: contain;
}
.stamp-title-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 12px 20px 4px;
}
.stamp-year {
  font-size: 22px;
  font-weight: 900;
  color: var(--ink);
  letter-spacing: 2px;
  font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
}
.stamp-title-img {
  height: 56px;
  object-fit: contain;
}
.stamp-subtitle {
  font-size: 13px;
  color: var(--ink);
  letter-spacing: -0.3px;
}
.stamp-progress {
  font-size: 13px;
  font-weight: 700;
  color: var(--green);
  margin: 6px 0 2px;
}
.stamp-circles {
  display: flex;
  gap: 18px;
  align-items: center;
  margin: 8px 0 4px;
}
.stamp-circle {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: #C8E8D4;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s ease;
}
.stamp-circle.stamped {
  background: #C8E8D4;
}
.stamp-circle.stamped img {
  width: 90px;
  height: 90px;
  object-fit: contain;
}
.stamp-circle.pop {
  animation: stampPop 0.45s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes stampPop {
  from { transform: scale(0.4); opacity: 0.5; }
  to   { transform: scale(1);   opacity: 1; }
}
.stamp-num {
  font-size: 32px;
  font-weight: 700;
  color: #7ab890;
}
.stamp-hint {
  font-size: 13px;
  color: var(--muted);
  min-height: 18px;
}
.stamp-message {
  font-size: 14px;
  font-weight: 700;
  color: var(--green);
  min-height: 20px;
}
.btn-get-cert {
  background: var(--green-dark);
  color: white;
  border: none;
  padding: 14px 40px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  border-radius: 4px;
  margin: 4px 0 20px;
  opacity: 0.3;
  pointer-events: none;
  font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
  transition: opacity 0.3s, background 0.2s;
}
.btn-get-cert.active {
  opacity: 1;
  pointer-events: auto;
}
.btn-get-cert.active:hover {
  background: var(--green);
}
.stamp-bottom {
  position: relative;
  width: 100%;
  height: 140px;
  overflow: hidden;
  flex-shrink: 0;
}
.stamp-grass {
  position: absolute;
  bottom: 0;
  left: -20%;
  right: -20%;
  height: 90px;
  background: var(--green);
  border-radius: 50% 50% 0 0;
}
.stamp-char-l {
  position: absolute;
  bottom: 42px;
  left: 16px;
  height: 96px;
  object-fit: contain;
}
.stamp-char-r {
  position: absolute;
  bottom: 42px;
  right: 16px;
  height: 88px;
  object-fit: contain;
}
@media (max-width: 480px) {
  .stamp-circle { width: 82px; height: 82px; }
  .stamp-circle.stamped img { width: 66px; height: 66px; }
  .stamp-num { font-size: 26px; }
  .stamp-title-img { height: 44px; }
  .stamp-circles { gap: 12px; }
  .stamp-bottom { height: 116px; }
  .stamp-grass { height: 72px; }
  .stamp-char-l { height: 78px; bottom: 32px; }
  .stamp-char-r { height: 70px; bottom: 32px; }
}
</style>
</head>
<body>

<!-- 스탬프 화면 -->
<div id="screen-stamp" style="display:none; width:100%; max-width:500px;">
  <div class="stamp-card">
    <div class="stamp-logos">
      <img src="assets/기후에너지 환경부 금강유역환경청.png" class="stamp-logo-l" alt="">
      <img src="assets/대전 MBC.png" class="stamp-logo-r" alt="">
    </div>
    <div class="stamp-title-area">
      <div class="stamp-year">2026</div>
      <img src="assets/초록 발자국 남기기 글자@4x.png" class="stamp-title-img" alt="초록 발자국 남기기">
      <div class="stamp-subtitle">환경의 날 기념 <strong>패밀리 그린워크</strong></div>
    </div>
    <div class="stamp-progress" id="stampProgress">0 / 3 스탬프 수집</div>
    <div class="stamp-circles" id="stampCircles">
      <div class="stamp-circle" id="stamp-1"><span class="stamp-num">1</span></div>
      <div class="stamp-circle" id="stamp-2"><span class="stamp-num">2</span></div>
      <div class="stamp-circle" id="stamp-3"><span class="stamp-num">3</span></div>
    </div>
    <div class="stamp-hint" id="stampHint">체크포인트 1 QR을 찍어주세요</div>
    <div class="stamp-message" id="stampMessage"></div>
    <button class="btn-get-cert" id="btnGetCert" onclick="goToNameInput()">완주 인증서 받기</button>
    <div class="stamp-bottom">
      <div class="stamp-grass"></div>
      <img src="assets/캐릭터 1.png" class="stamp-char-l" alt="">
      <img src="assets/캐릭터2.png" class="stamp-char-r" alt="">
    </div>
  </div>
</div>

<script>
// ── 단일 출처 상수 (날짜/행사명 중복 제거) ──
const EVENT = {
  dateLabel: '2026년 6월 5일',
  dateDay: '(금)',
  fullName: '2026 초록 발자국 남기기',
  subName: '패밀리 그린워크',
  maxNameLen: 8
};

const STAMPS = {
  tokens: { 1: 'Gw26cP1xK9m', 2: 'Gw26cP2nR4j', 3: 'Gw26cP3bT7p' },
  get()      { try { return JSON.parse(localStorage.getItem('greenWalkStamps') || '[]'); } catch(e) { return []; } },
  save(arr)  { localStorage.setItem('greenWalkStamps', JSON.stringify(arr)); },
  clear()    { localStorage.removeItem('greenWalkStamps'); },
  has(n)     { return this.get().includes(n); },
  add(n)     { const s = this.get(); if (!s.includes(n)) { s.push(n); this.save(s); } },
  count()    { return this.get().length; }
};

let currentName = '';

// 인증서 정적 텍스트 주입
document.getElementById('certEventDate').textContent = `${EVENT.dateLabel} ${EVENT.dateDay}`;
document.getElementById('certBottomDate').textContent = EVENT.dateLabel;
document.getElementById('certBody').innerHTML =
  `귀하는 ${EVENT.fullName}<br>${EVENT.subName}를 완주하였기에<br>이 인증서를 드립니다.`;

function generateCert() {
  const input = document.getElementById('nameInput');
  const raw = input.value.trim();
  if (!raw || raw.length > EVENT.maxNameLen) {
    input.focus();
    input.select();
    return;
  }
  currentName = raw;
  document.getElementById('certName').textContent = '';
  document.getElementById('screen-input').style.display = 'none';
  const certScreen = document.getElementById('screen-cert');
  certScreen.style.display = 'flex';
  window.scrollTo(0, 0);

  // 인증서 등장 애니메이션
  const wrap = document.querySelector('.cert-wrap');
  wrap.classList.remove('show');
  void wrap.offsetWidth;
  wrap.classList.add('show');

  // 내부 요소 stagger fade-in
  const items = Array.from(document.querySelector('.cert-right').children)
    .filter(el => !el.classList.contains('sr-only'));
  items.forEach(el => {
    el.style.opacity = '0';
    el.style.animation = 'none';
  });
  requestAnimationFrame(() => {
    items.forEach((el, i) => {
      el.style.animation = `fadeSlideUp 0.4s ease both`;
      el.style.animationDelay = `${0.25 + i * 0.07}s`;
    });
  });

  // 이름 타이핑 효과
  const nameEl = document.getElementById('certName');
  const spaced = raw.split('').join(' ');
  let idx = 0;
  const type = () => {
    if (idx <= spaced.length) {
      nameEl.textContent = spaced.slice(0, idx++);
      setTimeout(type, 60);
    }
  };
  setTimeout(type, 400);

  // 🎉 confetti
  setTimeout(launchConfetti, 300);
}

function goBack() {
  document.getElementById('screen-cert').style.display = 'none';
  document.getElementById('screen-input').style.display = 'none';
  renderStampScreen(null);
  document.getElementById('screen-stamp').style.display = 'block';
  window.scrollTo(0, 0);
}

function downloadCert() {
  const btn = document.querySelector('.btn-download');
  const cert = document.getElementById('certEl');
  btn.textContent = '저장 중...';
  btn.disabled = true;

  // 캡처 전 transform 해제
  const savedTransform = cert.style.transform;
  cert.style.transform = '';

  // cert 내 모든 요소의 inline 스타일 저장 후 강제 가시 상태로 고정
  const allEls = Array.from(cert.querySelectorAll('*'));
  const saved = allEls.map(el => ({
    animation:      el.style.animation,
    animationDelay: el.style.animationDelay,
    opacity:        el.style.opacity,
    transform:      el.style.transform,
    visibility:     el.style.visibility
  }));
  allEls.forEach(el => {
    el.style.animation      = 'none';
    el.style.animationDelay = '0s';
    el.style.opacity        = '1';
    el.style.visibility     = 'visible';
    if (el !== cert) el.style.transform = 'none';
  });

  const restoreAll = () => {
    allEls.forEach((el, i) => {
      el.style.animation      = saved[i].animation;
      el.style.animationDelay = saved[i].animationDelay;
      el.style.opacity        = saved[i].opacity;
      el.style.visibility     = saved[i].visibility;
      if (el !== cert) el.style.transform = saved[i].transform;
    });
    cert.style.transform = savedTransform;
    btn.textContent = '이미지 저장 (1:1)';
    btn.disabled = false;
  };

  // 강제 reflow 후 캡처 (스타일 적용 보장)
  void cert.offsetHeight;

  const imgDecodes = Array.from(cert.querySelectorAll('img')).map(img =>
    img.decode ? img.decode().catch(() => {}) : Promise.resolve()
  );
  const rafTick = new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

  Promise.all([document.fonts.ready, rafTick, ...imgDecodes])
  .then(() => html2canvas(cert, {
    scale: 2,
    useCORS: true,
    allowTaint: true,
    backgroundColor: '#ffffff',
    logging: false
  })).then(canvas => {
    const a = document.createElement('a');
    a.download = `완주인증서_${currentName || '완주자'}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
    STAMPS.clear();
    btn.textContent = '✓ 저장 완료!';
    btn.style.background = '#00883A';
    setTimeout(restoreAll, 2000);
  }).catch(err => {
    console.error('인증서 저장 실패:', err);
    alert('이미지 저장에 실패했습니다. 다시 시도해 주세요.');
    restoreAll();
  });
}

function renderStampScreen(newStamp) {
  const collected = STAMPS.get();
  const count = collected.length;

  document.getElementById('stampProgress').textContent = count + ' / 3 스탬프 수집';

  for (let i = 1; i <= 3; i++) {
    const el = document.getElementById('stamp-' + i);
    if (collected.includes(i) && !el.classList.contains('stamped')) {
      el.classList.add('stamped');
      el.innerHTML = '<img src="assets/stamp.png" alt="스탬프">';
      if (newStamp === i) {
        el.classList.remove('pop');
        void el.offsetWidth;
        el.classList.add('pop');
      }
    }
  }

  const hint = document.getElementById('stampHint');
  const btn  = document.getElementById('btnGetCert');

  if (count >= 3) {
    hint.textContent = '모든 체크포인트 완료! 🎉';
    btn.classList.add('active');
  } else {
    hint.textContent = '체크포인트 ' + (count + 1) + ' QR을 찍어주세요';
    btn.classList.remove('active');
  }
}

function processQRParam() {
  const params = new URLSearchParams(window.location.search);
  const cp     = parseInt(params.get('cp'));
  const token  = params.get('token');

  if (!cp || !token) return null;
  if (STAMPS.tokens[cp] !== token) return null;

  const collected = STAMPS.get();
  if (collected.includes(cp)) return 'already-collected';

  if (cp > 1 && !collected.includes(cp - 1)) return 'wrong-order';

  STAMPS.add(cp);
  return cp;
}

function goToNameInput() {
  document.getElementById('screen-stamp').style.display = 'none';
  document.getElementById('screen-input').style.display = 'block';
  window.scrollTo(0, 0);
}

function initStampScreen() {
  const result = processQRParam();

  const msgEl = document.getElementById('stampMessage');
  if (result === 'wrong-order') {
    msgEl.textContent = '이전 체크포인트를 먼저 방문해주세요!';
  } else if (typeof result === 'number') {
    msgEl.textContent = '스탬프 ' + result + '번 완료! ✓';
    setTimeout(function() { msgEl.textContent = ''; }, 3000);
  }

  renderStampScreen(typeof result === 'number' ? result : null);

  if (window.history.replaceState) {
    window.history.replaceState({}, document.title, window.location.pathname);
  }

  document.getElementById('screen-stamp').style.display = 'block';
}

document.getElementById('nameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') generateCert();
});

function launchConfetti() {
  const wrap = document.querySelector('.cert-wrap');
  const canvas = document.createElement('canvas');
  canvas.width = 600; canvas.height = 600;
  canvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:20;';
  wrap.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  const colors = ['#00883A','#2D9E5A','#ffffff','#A8E6BF','#FFD700','#FF8C69','#87CEEB'];
  const particles = Array.from({length: 90}, (_, i) => ({
    x: Math.random() * 600,
    y: -10 - Math.random() * 100,
    vx: (Math.random() - 0.5) * 4,
    vy: Math.random() * 3 + 2,
    color: colors[i % colors.length],
    w: Math.random() * 10 + 5,
    h: Math.random() * 6 + 3,
    rot: Math.random() * 360,
    vr: (Math.random() - 0.5) * 6,
    alpha: 1
  }));
  let frame = 0;
  (function draw() {
    ctx.clearRect(0, 0, 600, 600);
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      if (frame > 50) p.alpha = Math.max(0, p.alpha - 0.018);
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx.restore();
    });
    if (++frame < 110) requestAnimationFrame(draw);
    else canvas.remove();
  })();
}

function scaleCert() {
  const wrap = document.querySelector('.cert-wrap');
  const cert = document.getElementById('certEl');
  if (!wrap || !cert) return;
  if (window.innerWidth <= 660) {
    const size = Math.min(window.innerWidth - 32, 600);
    const scale = size / 600;
    wrap.style.width  = size + 'px';
    wrap.style.height = size + 'px';
    cert.style.transform = `scale(${scale})`;
  } else {
    wrap.style.width = '';
    wrap.style.height = '';
    cert.style.transform = '';
  }
}
document.getElementById('screen-input').style.display = 'none';
initStampScreen();
scaleCert();
window.addEventListener('resize', scaleCert);
</script>
